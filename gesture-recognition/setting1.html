<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings Popup</title>
  <style>
    :root {
      --bg-color: #f5f5f5;
      --text-color: #333;
      --card-bg: #ffffff;
    }

    body.dark {
      --bg-color: #1e1e1e;
      --text-color: #f5f5f5;
      --card-bg: #2c2c2c;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    #openPopupBtn {
      margin: 1rem;
      padding: 0.7rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    #openPopupBtn:hover {
      background-color: #0056b3;
    }

    .popup-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .popup {
      background-color: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 500px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-color);
    }

    h1 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .setting-section {
      padding: 1rem 0;
      border-bottom: 1px solid #ccc;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    select, input[type="range"], input[type="checkbox"] {
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .switch {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #sensitivity-value {
      font-weight: bold;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>

<!-- Button to open settings -->
<button id="openPopupBtn">Open Settings</button>

<!-- Settings Popup -->
<div class="popup-overlay" id="settingsPopup">
  <div class="popup">
    <button class="close-btn" id="closePopup" aria-label="Close settings">&times;</button>
    <h1 id="title">Settings / Preferences</h1>

    <div class="setting-section">
      <label for="language" id="language-label">Select Language (UI + Speech):</label>
      <select id="language">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="hi">Hindi</option>
        <option value="fr">French</option>
      </select>
    </div>

    <div class="setting-section">
      <label id="audio-label">Toggle Audio Output:</label>
      <div class="switch">
        <input type="checkbox" id="audioToggle" checked />
        <label for="audioToggle" id="audioToggleLabel">Enable Audio</label>
      </div>
    </div>

    <div class="setting-section">
      <label id="theme-label">Theme:</label>
      <div class="switch">
        <input type="checkbox" id="themeToggle" />
        <label for="themeToggle" id="themeToggleLabel">Dark Mode</label>
      </div>
    </div>

    <div class="setting-section">
      <label for="sensitivity" id="sensitivity-label">Gesture Detection Sensitivity:</label>
      <input type="range" id="sensitivity" min="1" max="10" value="5" />
      <span id="sensitivity-value">5</span>
    </div>
  </div>
</div>

<script>
  const translations = {
    en: {
      title: "Settings / Preferences",
      languageLabel: "Select Language (UI + Speech):",
      audioLabel: "Toggle Audio Output:",
      audioToggleLabel: "Enable Audio",
      themeLabel: "Theme:",
      themeToggleLabel: "Dark Mode",
      sensitivityLabel: "Gesture Detection Sensitivity:"
    },
    es: {
      title: "Configuraciones / Preferencias",
      languageLabel: "Seleccionar idioma (IU + voz):",
      audioLabel: "Activar salida de audio:",
      audioToggleLabel: "Habilitar audio",
      themeLabel: "Tema:",
      themeToggleLabel: "Modo oscuro",
      sensitivityLabel: "Sensibilidad de detección de gestos:"
    },
    hi: {
      title: "सेटिंग्स / वरीयताएँ",
      languageLabel: "भाषा चुनें (यूआई + भाषण):",
      audioLabel: "ऑडियो आउटपुट टॉगल करें:",
      audioToggleLabel: "ऑडियो सक्षम करें",
      themeLabel: "थीम:",
      themeToggleLabel: "डार्क मोड",
      sensitivityLabel: "हावभाव पहचान संवेदनशीलता:"
    },
    fr: {
      title: "Paramètres / Préférences",
      languageLabel: "Sélection de la langue (UI + voix) :",
      audioLabel: "Activer la sortie audio :",
      audioToggleLabel: "Activer le son",
      themeLabel: "Thème :",
      themeToggleLabel: "Mode sombre",
      sensitivityLabel: "Sensibilité de détection des gestes :"
    }
  };

  const settingsPopup = document.getElementById('settingsPopup');
  const themeToggle = document.getElementById('themeToggle');

  // Load saved preferences
  window.onload = () => {
    const savedLang = localStorage.getItem("preferredLanguage") || "en";
    const isDarkMode = localStorage.getItem("darkMode") === "true";
    document.getElementById("language").value = savedLang;
    themeToggle.checked = isDarkMode;
    document.body.classList.toggle("dark", isDarkMode);
    updateLanguage(savedLang);
  };

  function updateLanguage(lang) {
    const t = translations[lang];
    document.getElementById("title").textContent = t.title;
    document.getElementById("language-label").textContent = t.languageLabel;
    document.getElementById("audio-label").textContent = t.audioLabel;
    document.getElementById("audioToggleLabel").textContent = t.audioToggleLabel;
    document.getElementById("theme-label").textContent = t.themeLabel;
    document.getElementById("themeToggleLabel").textContent = t.themeToggleLabel;
    document.getElementById("sensitivity-label").textContent = t.sensitivityLabel;
  }

  document.getElementById('openPopupBtn').addEventListener('click', () => {
    settingsPopup.style.display = 'flex';
  });

  document.getElementById('closePopup').addEventListener('click', () => {
    settingsPopup.style.display = 'none';
  });

  themeToggle.addEventListener('change', (e) => {
    const isDark = e.target.checked;
    document.body.classList.toggle('dark', isDark);
    localStorage.setItem("darkMode", isDark);
  });

  document.getElementById('sensitivity').addEventListener('input', (e) => {
    document.getElementById('sensitivity-value').textContent = e.target.value;
  });

  document.getElementById('audioToggle').addEventListener('change', (e) => {
    console.log(`Audio Output ${e.target.checked ? 'Enabled' : 'Disabled'}`);
  });

  document.getElementById('language').addEventListener('change', (e) => {
    const selectedLang = e.target.value;
    localStorage.setItem("preferredLanguage", selectedLang);
    updateLanguage(selectedLang);
  });
</script>

</body>
</html>
