<!DOCTYPE html>
<html>
<head>
  <title>MediaPipe Gesture Recognition</title>
  <style>
    body {
      /* Set up the overall layout and background */
      margin: 0;
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333333;
    }
    #container {
      /* Center the main container and style it */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 20px;
      width: 100%;
      max-width: 800px;
      padding: 20px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    #cameraView {
      /* Style the camera view area */
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
      border-radius: 8px;
      height: 405px; /* Match canvas height */
      max-width: 720px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    #cameraView::before {
      /* Display a message when the camera is inactive */
      content: "Please click on 'Enable Webcam' below to start";
      position: absolute;
      color: #666666;
      font-size: 18px;
      text-align: center;
      display: none;
    }
    #cameraView.inactive::before {
      display: block;
    }
    canvas {
      /* Style the canvas for the camera feed */
      display: block;
      transform: scaleX(-1); /* Mirror the camera feed */
      border: 2px solid #dddddd;
      border-radius: 8px;
      width: 100%;
      height: auto;
    }
    #results {
      /* Style the results section */
      width: 100%;
      padding: 15px; /* Reduced padding */
      background: #f9f9f9;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    #gesture_output {
      /* Style the gesture output display */
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
      padding: 20px;
      background: linear-gradient(135deg, #4caf50, #81c784);
      color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      /* Add a pulsing effect to the gesture output */
      0%, 100% {
        box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
      }
      50% {
        box-shadow: 0 0 20px rgba(76, 175, 80, 1);
      }
    }
    button {
      /* Style the button */
      padding: 12px 24px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }
    h2 {
      /* Style the heading */
      font-size: 20px;
      margin-bottom: 5px;
      color: #333333;
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- Camera view section -->
    <div id="cameraView" class="inactive">
      <canvas id="output_canvas" width="720" height="405"></canvas>
    </div>
    <!-- Button to enable/disable the webcam -->
    <button id="webcamButton">Enable Webcam</button>
    <!-- Results section -->
    <div id="results">
      <h2>Hand Tracking and Gesture Recognition Results</h2>
      <div id="gesture_output" style="display: none;">No gesture detected</div>
    </div>
  </div>

  <!-- MediaPipe Gesture Recognition Script -->
  <script type="module">
    import {
      GestureRecognizer,
      FilesetResolver,
      DrawingUtils
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    // DOM elements
    const video = document.createElement("video");
    const canvas = document.getElementById("output_canvas");
    const canvasCtx = canvas.getContext("2d");
    const button = document.getElementById("webcamButton");
    const gestureOutput = document.getElementById("gesture_output");
    const cameraView = document.getElementById("cameraView");

    let gestureRecognizer; // Gesture recognizer instance
    let webcamRunning = false; // Webcam state

    // Initialize the gesture recognizer
    async function initializeGestureRecognizer() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );
      gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO"
      });
    }

    // Handle the webcam button click
    button.onclick = async () => {
      if (!gestureRecognizer) {
        await initializeGestureRecognizer();
      }

      if (webcamRunning) {
        // Stop the webcam
        webcamRunning = false;
        button.textContent = "Enable Webcam";
        cameraView.classList.add("inactive");
        return;
      }

      try {
        // Start the webcam
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          webcamRunning = true;
          button.textContent = "Disable Webcam";
          cameraView.classList.remove("inactive");
          predictWebcam();
        };
      } catch (error) {
        console.error("Camera error:", error);
        alert("Could not access the camera. Please check permissions.");
      }
    };

    // Predict gestures from the webcam feed
    async function predictWebcam() {
      if (!webcamRunning) return;

      const nowInMs = Date.now();
      const results = gestureRecognizer.recognizeForVideo(video, nowInMs);

      // Draw the camera feed and landmarks
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
      canvasCtx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (results.landmarks) {
        const drawingUtils = new DrawingUtils(canvasCtx);
        for (const landmarks of results.landmarks) {
          drawingUtils.drawConnectors(landmarks, GestureRecognizer.HAND_CONNECTIONS, {
            color: "#00FF00",
            lineWidth: 5
          });
          drawingUtils.drawLandmarks(landmarks, {
            color: "#FF0000",
            lineWidth: 2
          });
        }
      }

      // Display gesture recognition results
      if (results.gestures.length > 0) {
        const categoryName = results.gestures[0][0].categoryName;
        const categoryScore = (results.gestures[0][0].score * 100).toFixed(2);
        const handedness = results.handednesses[0][0].displayName;

        gestureOutput.style.display = "block";
        gestureOutput.innerHTML = `
          <div><strong>Gesture:</strong> ${categoryName}</div>
          <div style="margin-top: 10px;"><strong>Confidence:</strong> ${categoryScore}%</div>
          <div style="margin-top: 10px;"><strong>Handedness:</strong> ${handedness}</div>
        `;
      } else {
        gestureOutput.style.display = "none";
      }

      canvasCtx.restore();

      // Continue predicting if the webcam is running
      if (webcamRunning) {
        window.requestAnimationFrame(predictWebcam);
      }
    }
  </script>
</body>
</html>
